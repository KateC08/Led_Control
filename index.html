<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT - Assignment 1</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --on-color: #22c55e;
            --off-color: #ef4444;
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--primary-bg); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* Simple background gradient for depth */
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 350px;
        }

        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        /* The Live Bulb Indicator */
        #led-indicator {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #334155;
            margin: 0 auto 20px;
            transition: 0.4s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Bulb Glow States */
        .status-on { 
            background: var(--on-color) !important; 
            box-shadow: 0 0 30px var(--on-color), inset 0 2px 4px rgba(255,255,255,0.4) !important; 
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn { 
            padding: 14px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 12px; 
            border: none; 
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .on { background-color: var(--on-color); color: white; }
        .on:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .off { background-color: #334155; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .off:hover { background-color: var(--off-color); color: white; }

        #status-msg { 
            margin-top: 20px; 
            font-size: 12px; 
            font-weight: 500; 
            color: var(--on-color); 
            height: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="led-indicator"></div>
        <h1>LED Control</h1>
        <p>ESP32 blue led controlled</p>
        
        <div class="btn-group">
            <button class="btn on" onclick="sendData(1)">Power On</button>
            <button class="btn off" onclick="sendData(0)">Power Off</button>
        </div>

        <p id="status-msg"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const indicator = document.getElementById('led-indicator');
        const statusText = document.getElementById('status-msg');

        // REAL-TIME FEEDBACK: Update the UI whenever the database changes
        database.ref('/LED_Status').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val === 1) {
                indicator.classList.add('status-on');
            } else {
                indicator.classList.remove('status-on');
            }
        });

        function sendData(val) {
            // Optimistic UI Update
            statusText.innerText = "Transmitting...";
            
            database.ref('/LED_Status').set(val)
            .then(() => {
                statusText.innerText = "Synced";
                setTimeout(() => { statusText.innerText = ""; }, 1500);
            })
            .catch(err => {
                statusText.style.color = "#ef4444";
                statusText.innerText = "Error!";
            });
        }
    </script>
</body>
</html>
